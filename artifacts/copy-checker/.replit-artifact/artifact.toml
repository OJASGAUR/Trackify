kind = "web"
previewPath = "/"
title = "Copy Checker"
version = "1.0.0"
id = "artifacts/copy-checker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23081

[services.development]
run = "pnpm --filter @workspace/copy-checker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/copy-checker", "run", "build" ]
publicDir = "artifacts/copy-checker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23081"
BASE_PATH = "/"
